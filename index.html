<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather app</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
</head>
<body>
    <div id="container-1">

            <form action="">
                <legend>Enter location</legend>
                <div>
                    <label for="location"></label>
                    <input type="text" id="location">
                </div>
                <input type="submit" id="btn">
                <button id="temp-button">Celsius</button>
            </form>

        <div id="data-gif-cont">
            <div id="data-container">
                <div id="location-container">
                    <h3>Location</h3>
                    <p></p>
                </div>
                <div id="conditions-container">
                    <h3>Conditions</h3>
                    <p id="conditions-p"></p>
                </div>
                <div id="temp-container">
                    <h3>Temperature</h3>
                    <p id="temp-p"></p>
                </div>
                <div id="feelslike-container">
                    <h3>Feels like</h3>
                    <p id="feelslike-p"></p>
                </div>
                <div id="precip-container">
                    <h3>Precipitation</h3>
                    <p></p>
                </div>
                <div id="desc-container">
                    <h3>Description</h3>
                    <p></p>
                </div>

            </div>
            <div id="gif-cont">
                <img src="#" alt="">
            </div>
        </div>


    </div>

</body>
</html>
